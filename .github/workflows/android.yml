name: Android Build (APK + AAB)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # nötig, um das Release zu aktualisieren

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version
      - run: flutter pub get

      - name: Signatur vorbereiten (falls Keystore hinterlegt)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload.jks
            printf 'storeFile=upload.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
              "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > android/key.properties
            echo "Release-Signatur aktiv."
          else
            echo "Kein Keystore hinterlegt - es wird mit dem Debug-Schluessel gebaut."
          fi

      # Versionsnummer zählt automatisch hoch -> Update über die alte App klappt
      - name: APK bauen (universell)
        run: flutter build apk --release --build-number=${{ github.run_number }} --dart-define=BUILD_NUMBER=${{ github.run_number }}

      - name: App-Bundle bauen (Play Store)
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: APK freundlich benennen
        run: cp build/app/outputs/flutter-apk/app-release.apk Tagesbegleiter.apk

      - name: Versionsdatei erzeugen
        run: |
          printf '{"build": %s}\n' "${{ github.run_number }}" > version.json

      - name: APK als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: tagesbegleiter-apk
          path: Tagesbegleiter.apk

      - name: App-Bundle als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: tagesbegleiter-aab
          path: build/app/outputs/bundle/release/app-release.aab

      # Immer das gleiche Release "latest" mit der frischen APK aktualisieren.
      # Damit zeigt .../releases/latest (der Knopf in der App) stets auf die neueste Version.
      - name: Release "latest" aktualisieren
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Tagesbegleiter – neueste Version
          make_latest: true
          body: |
            Automatisch gebaut aus dem aktuellen Stand (Build ${{ github.run_number }}).
            Zum Installieren: **Tagesbegleiter.apk** antippen.
          files: |
            Tagesbegleiter.apk
            version.json
