name: tagesbegleiter
description: Barrierefreie App zur Tagesstrukturierung – Orientierung im Alltag, ein Schritt nach dem anderen.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2          # State-Management
  flutter_svg: ^2.0.10      # eigene handgezeichnete SVG-Icons
  audioplayers: ^6.1.0      # ElevenLabs-Sprachdateien abspielen
  flutter_tts: ^4.2.0       # Rückfall: geräteeigene Sprachausgabe
  flutter_local_notifications: ^17.2.3  # automatisches Aufpoppen
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  file_picker: ^8.1.2       # Icons & Audio zuweisen
  intl: ^0.19.0
  vibration: ^2.0.0
  timezone: ^0.9.4
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/audio/
